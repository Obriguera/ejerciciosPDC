<!doctype html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Formulario con Bootstrap</title>
  <link rel="stylesheet" href="./index.css" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous" />
</head>

<body class="cuerpo">
  <h3>FORMULARIO RESPONSIVE</h3>
  <div class="container">
    <div class="row justify-content-center">

      <div class="col-12 col-sm-11 col-md-10 col-lg-8 col-xl-6">
        <form>
          <div class="mb-3">
            <label for="nombreCompleto" class="form-label">Nombre completo</label>
            <input type="text" id="nombreCompleto" name="nombreCompleto" required />
          </div>

          <div class="mb-3">
            <label for="correo" class="form-label">Direccion de correo electronico</label>
            <input type="email" id="correo" name="correo" required />
          </div>

          <div class="mb-3">
            <label for="contrasena" class="form-label">Contrasena</label>
            <input type="password" id="contrasena" name="contrasena" minlength="8" required />
          </div>

          <select name="cursos" id="sel-cursos" required>
            <option value=""></option>
            <option value="cursoA">Ingeniería en bebidas</option>
            <option value="cursoB">Ingeniería en alimentos</option>
            <option value="cursoC">Ingeniería en condimentos</option>
          </select>

          <div>
            <label>
              <input type="checkbox" id="cbox1" value="1" /> Noticias detecnología
            </label>
            <br />
            <label>
              <input type="checkbox" id="cbox2" value="2" /> Cursos Nuevos
            </label>
            <br />
            <label>
              <input type="checkbox" id="cbox3" value="3" /> Ofertas
              especiales
            </label>
          </div>

          <button type="submit" class="btn btn-warning">Envíar</button>
        </form>

      </div>

    </div>
  </div>
</body>

</html>
